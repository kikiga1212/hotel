<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle !=null?pageTitle+'- 호텔 관리자':'호텔관리자'}">Title</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!-- 네비게이션-->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <!-- 브랜드-->
        <a class="navbar-brand fw-bold" href="/admin">
            <i class="bi bi-building me-2"></i> 호텔관리자
        </a>
        <!--모바일 메뉴(토글버튼) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <!--메뉴영역 -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <!--왼쪽메뉴 -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><!--대시보드 -->
                    <a class="nav-link"
                       th:classappend="${currentPage == 'dashboard'}?'active'"
                       href="/admin">
                        <i class="bi bi-speedometer2 me-1"></i> 대시보드
                    </a>
                </li>
                <li class="nav-item"><!--룸관리 -->
                    <a class="nav-link"
                       th:classappend="${currentPage == 'rooms'}?'active'"
                       href="/admin/rooms">
                        <i class="bi bi-door-open me-1"></i> 룸관리
                    </a>
                </li>
                <li class="nav-item"><!--예약관리 -->
                    <a class="nav-link"
                       th:classappend="${currentPage == 'reservations'}?'active'"
                       href="/admin/reservations">
                        <i class="bi bi-calendar-check me-1"></i> 예약관리
                    </a>
                </li>
            </ul>

            <!--오른쪽 메뉴 -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><!--사용자 페이지-->
                    <a class="nav-link" href="/" target="_blank">
                        <i class="bi bi-globe me-1"></i> 사용자 페이지
                    </a>
                </li>
                <li class="nav-item"><!--H2 DB콘솔 -->
                    <a class="nav-link" href="/h2-console" target="_blank">
                        <i class="bi bi-database-check me-1"></i> DB Console
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>
<!-- 성공/오류 메시지 표시-->
<div th:fragment="flashMessages">
    <!-- 성공메시지-->
    <div th:if="${successMessage}" role="alert"
    class="alert alert-success alert-dismissible fade show"><!-- 성공메시지를 받았으면-->
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- 실패(오류)메시지-->
    <div th:if="${errorMessage}" role="alert"
         class="alert alert-danger alert-dismissible fade show"><!-- 오류메시지를 받았으면-->
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
</body>
</html>
<!--
th:fragment를 활용해 공통 요소(Header, Navbar, Messages)를 분리해두면,
나중에 새로운 관리 페이지를 추가할 때 코드 중복 없이 th:replace나 th:insert만으로 간편하게 레이아웃을 구성할 수 있습니다.
1. th:classappend를 활용한 동적 메뉴 활성화
currentPage 변수 값에 따라 active 클래스를 추가하는 방식은 아주 훌륭합니다.
3. Flash Messages 레이아웃
성공(successMessage)과 오류(errorMessage) 메시지를 부트스트랩 알림창(Alert)으로 구현하
셨는데, alert-dismissible 클래스를 넣어 사용자가 직접 닫을 수 있게 한 점이 실무적입니다.
-->
