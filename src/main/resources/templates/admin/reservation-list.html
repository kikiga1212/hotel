<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout::head}">
    <title>예약 관리</title>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout::navbar}"></nav>
<div class="contanier-fluid py-4">
    <!-- 메시지-->
    <div th:replace="~{fragments/layout::flashMessages}"></div>
    <!-- 페이지 제목-->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-calendar-check me-2 text-primary"></i> 예약 관리
        </h2>
        <a href="/admin/reservations/new" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> 새로운 예약 등록
        </a>
    </div>
    <!-- 룸 리스트 테이블-->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive"><!--상태 필터 기능-->
                <div class="mb-3">
                    <div class="btn-group btn-group-sm">
                        <a href="/admin/reservations" class="btn btn-outline-secondary"
                           th:classappend="${param.status == null} ? 'active'">전체</a>
                        <a href="/admin/reservations?status=PENDING" class="btn btn-outline-warning"
                           th:classappend="${param.status?.toString() == 'PENDING'} ? 'active'">대기</a>
                        <a href="/admin/reservations?status=CONFIRMED" class="btn btn-outline-success"
                           th:classappend="${param.status?.toString() == 'CONFIRMED'} ? 'active'">확정</a>
                    </div>
                </div>

                <table class="table table-hover mb-0">
                    <!-- 테이블 제목-->
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">예약 번호</th>
                        <th>고객 정보</th>
                        <th>룸</th>
                        <th>체크인</th>
                        <th>체크아웃</th>
                        <th>인원</th>
                        <th>총 금액</th>
                        <th>상태</th>
                        <th class="text-center">관리</th>
                    </tr>

                    </thead>
                    <!-- 테이블 본문-->
                    <tbody>
                    <!-- 데이터가 없을 때-->
                    <tr th:if="${#lists.isEmpty(reservations)}">
                        <td colspan="9" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            예약 내역이 없습니다.
                        </td>
                    </tr>
                    <!-- 데이터가 있을 때-->
                    <tr th:each="res : ${reservations}">
                        <td class="ps-3 align-middle text-muted" th:text="${res.id}"></td>
                        <td class="align-middle">
                            <div class="fw-semibold" th:text="${res.guestName}"></div>
                            <small class="text-muted" th:text="${res.getGuestEmail()}"></small>
                        </td>
                        <td class="align-middle">
                            <div th:text="${res.roomName}"></div>
                            <small class="text-muted" th:text="${res.roomType}"></small>
                        </td>
                        <td class="align-middle" th:text="${res.checkInDate}"></td>
                        <td class="align-middle" th:text="${res.checkOutDate}"></td>
                        <td class="align-middle text-center" th:text="${res.numberOfGuests}+' 명'"></td><!-- 인원-->
                        <td class="align-middle fw-semibold"
                        th:text="${#numbers.formatDecimal(res.totalPrice,0,'COMMA',0,'POINT')+' 원'}"></td>
                        <td class="align-middle"><!-- 상태-->
                            <span th:switch="${res.status?.name()}">
                                <span th:case="'PENDING'" class="badge bg-warning text-dark"
                                th:text="${res.statusDisplayName}"></span>
                                 <span th:case="'CONFIRMED'" class="badge bg-success"
                                       th:text="${res.statusDisplayName}"></span>
                                 <span th:case="'CANCELLED'" class="badge bg-danger"
                                       th:text="${res.statusDisplayName}"></span>
                                 <span th:case="'COMPLETED'" class="badge bg-secondary text-dark"
                                       th:text="${res.statusDisplayName}"></span>
                            </span>
                        </td>
                        <td class="align-middle text-center">
                            <a th:href="@{/admin/reservations/{id}(id=${res.id})}"
                            class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye me-1"></i> 상세
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- 테이블 푸터 -->
        <div class="card-footer bg-white text-muted">
            전체 <span th:text="${#lists.size(reservations)}">0</span> 건의 예약
        </div>

    </div>
</div>

</body>
</html>
